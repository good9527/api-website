# 部署到EdgeOne Pages
# 自动部署静态文件到EdgeOne Pages

name: Deploy to EdgeOne Pages

on:
  # 当数据采集工作流完成时触发
  workflow_run:
    workflows: ["Collect Data"]
    types:
      - completed
  
  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

# 环境变量
env:
  EDGEONE_TOKEN: ${{ secrets.EDGEONE_TOKEN }}
  EDGEONE_ZONE_ID: ${{ secrets.EDGEONE_ZONE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 只有数据采集成功时才部署
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    # 环境
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. 设置Node.js环境（用于构建前端）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      # 3. 安装前端依赖
      - name: Install frontend dependencies
        run: |
          cd web
          npm ci
      
      # 4. 构建前端
      - name: Build frontend
        run: |
          cd web
          npm run build
        env:
          NODE_ENV: production
      
      # 5. 准备部署目录
      - name: Prepare deployment
        run: |
          # 创建部署目录
          mkdir -p deploy
          
          # 复制API数据
          cp -r api/ deploy/api/
          
          # 复制前端构建产物
          cp -r web/dist/ deploy/web/
          
          # 创建根目录index.html（重定向到web）
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=/web/">
            <title>API Platform</title>
          </head>
          <body>
            <p>Redirecting to <a href="/web/">web interface</a>...</p>
          </body>
          </html>
          EOF
          
          # 创建robots.txt
          cat > deploy/robots.txt << 'EOF'
          User-agent: *
          Allow: /
          Sitemap: https://api.example.com/sitemap.xml
          EOF
          
          # 创建sitemap.xml
          cat > deploy/sitemap.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://api.example.com/</loc>
              <lastmod>$(date -u +%Y-%m-%d)</lastmod>
              <changefreq>daily</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://api.example.com/web/</loc>
              <lastmod>$(date -u +%Y-%m-%d)</lastmod>
              <changefreq>daily</changefreq>
              <priority>0.9</priority>
            </url>
            <url>
              <loc>https://api.example.com/api/health.json</loc>
              <lastmod>$(date -u +%Y-%m-%d)</lastmod>
              <changefreq>hourly</changefreq>
              <priority>0.8</priority>
            </url>
          </urlset>
          EOF
          
          echo "Deployment directory prepared"
      
      # 6. 部署到EdgeOne Pages
      - name: Deploy to EdgeOne Pages
        run: |
          # 检查是否配置了EdgeOne Token
          if [ -z "$EDGEONE_TOKEN" ]; then
            echo "::warning::EdgeOne token not configured, skipping deployment"
            exit 0
          fi
          
          # 这里应该调用EdgeOne Pages的部署API
          # 由于EdgeOne Pages的具体API可能不同，这里提供示例
          
          echo "Deploying to EdgeOne Pages..."
          
          # 示例：使用curl调用EdgeOne API
          # curl -X POST "https://api.edgeone.com/v1/zones/$EDGEONE_ZONE_ID/pages/deploy" \
          #   -H "Authorization: Bearer $EDGEONE_TOKEN" \
          #   -H "Content-Type: application/json" \
          #   -d '{"directory": "deploy"}'
          
          echo "Deployment completed"
        env:
          EDGEONE_TOKEN: ${{ secrets.EDGEONE_TOKEN }}
          EDGEONE_ZONE_ID: ${{ secrets.EDGEONE_ZONE_ID }}
      
      # 7. 验证部署
      - name: Verify deployment
        run: |
          # 等待部署生效
          sleep 30
          
          # 检查API健康状态
          echo "Verifying deployment..."
          
          # 示例：检查API健康状态
          # curl -f "https://api.example.com/api/health.json" || exit 1
          
          echo "Deployment verification completed"
      
      # 8. 清理部署目录
      - name: Cleanup
        if: always()
        run: |
          rm -rf deploy
          echo "Cleanup completed"
      
      # 9. 发送部署通知
      - name: Send deployment notification
        if: success()
        run: |
          echo "::notice::Deployment completed successfully"
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "Commit: ${{ github.sha }}"
      
      # 10. 发送失败通知
      - name: Send failure notification
        if: failure()
        run: |
          echo "::error::Deployment failed"
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "Commit: ${{ github.sha }}"